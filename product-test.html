<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmRoute Product Tester</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 min-h-screen grid grid-cols-1 md:grid-cols-2 gap-8">

  <div class="bg-white p-6 rounded-lg shadow-md max-w-md h-fit">
    <h2 class="text-xl font-bold text-green-700 mb-4">Post a Crop (HTML Test)</h2>
    <form id="productForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Crop Name</label>
        <input type="text" id="title" required class="mt-1 block w-full p-2 border rounded">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Description</label>
        <textarea id="description" required class="mt-1 block w-full p-2 border rounded"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Price / Kg (₦)</label>
          <input type="number" id="price" required class="mt-1 block w-full p-2 border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Qty Available (Kg)</label>
          <input type="number" id="quantity" required class="mt-1 block w-full p-2 border rounded">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Farm Location</label>
        <input type="text" id="location" placeholder="e.g., Gboko, Benue State" required class="mt-1 block w-full p-2 border rounded">
      </div>
      <button type="submit" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700 transition">
        Upload Crop to Database
      </button>
    </form>
  </div>

  <div class="bg-white p-6 rounded-lg shadow-md">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-gray-800">Live Marketplace Data</h2>
      <button id="refreshBtn" class="text-sm bg-gray-200 px-3 py-1 rounded hover:bg-gray-300">Manual Refresh</button>
    </div>
    <div id="marketList" class="space-y-4 max-h-[500px] overflow-y-auto">
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "farmroute-xxx.firebaseapp.com",
      projectId: "farmroute-xxx",
      storageBucket: "farmroute-xxx.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const marketList = document.getElementById('marketList');

    // Function to download data and render it on screen
    async function loadProducts() {
      marketList.innerHTML = '<p class="text-gray-500 text-center">Loading live data...</p>';
      try {
        const querySnapshot = await getDocs(collection(db, "products"));
        marketList.innerHTML = ''; // clear loading state
        
        if (querySnapshot.empty) {
          marketList.innerHTML = '<p class="text-gray-500 text-center py-8">No crops listed in Firestore yet.</p>';
          return;
        }

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const card = `
            <div class="p-4 border rounded-lg bg-green-50/30">
              <div class="flex justify-between items-start">
                <h3 class="font-bold text-lg text-gray-900">${data.title}</h3>
                <span class="text-sm font-semibold bg-green-100 text-green-800 px-2 py-0.5 rounded">₦${data.pricePerKg}/kg</span>
              </div>
              <p class="text-gray-600 text-sm my-1">${data.description}</p>
              <div class="flex justify-between text-xs text-gray-400 mt-2 pt-2 border-t">
                <span>Stock: ${data.availableQuantity}kg</span>
                <span>📍 ${data.location}</span>
              </div>
            </div>`;
          marketList.innerHTML += card;
        });
      } catch (err) {
        marketList.innerHTML = `<p class="text-red-500 text-center">Error: ${err.message}</p>`;
      }
    }

    // Handle product addition
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const user = auth.currentUser;
      if (!user) {
        alert("Error: You must be logged in first on the Auth page to list a crop!");
        return;
      }

      try {
        await addDoc(collection(db, "products"), {
          farmerId: user.uid,
          title: document.getElementById('title').value,
          description: document.getElementById('description').value,
          pricePerKg: Number(document.getElementById('price').value),
          availableQuantity: Number(document.getElementById('quantity').value),
          location: document.getElementById('location').value,
          createdAt: new Date().toISOString()
        });

        alert("Crop uploaded successfully!");
        document.getElementById('productForm').reset();
        loadProducts(); // automatically refresh view
      } catch (err) { alert(err.message); }
    });

    document.getElementById('refreshBtn').addEventListener('click', loadProducts);
    
    // Auto-run database load on startup
    loadProducts();
  </script>
</body>
</html>
