<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmRoute Auth Tester</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6 text-green-700">FarmRoute Auth Tester</h2>
    
    <div class="flex justify-around mb-6 border-b pb-2">
      <button id="showSignup" class="font-semibold text-green-600 border-b-2 border-green-600 pb-1">Sign Up</button>
      <button id="showLogin" class="font-semibold text-gray-400 pb-1">Login</button>
    </div>

    <form id="authForm" class="space-y-4">
      <input type="hidden" id="formMode" value="signup">

      <div id="signupFields" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Full Name</label>
          <input type="text" id="fullName" class="mt-1 block w-full p-2 border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Phone Number</label>
          <input type="text" id="phoneNumber" placeholder="+234..." class="mt-1 block w-full p-2 border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Role</label>
          <select id="role" class="mt-1 block w-full p-2 border rounded bg-white">
            <option value="farmer">Farmer</option>
            <option value="buyer">Buyer</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" required class="mt-1 block w-full p-2 border rounded">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" required class="mt-1 block w-full p-2 border rounded">
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700 transition">
        Create Test Account
      </button>
    </form>

    <hr class="my-6">
    <button id="logoutBtn" class="w-full bg-red-500 text-white p-2 rounded hover:bg-red-600 transition">Test Logout</button>
  </div>

  <script type="module">
    // Import Firebase modules using ES Modules directly from CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // TODO: Replace with your actual project keys
    const firebaseConfig = {
      apiKey: "AIzaSyDIbnRsXJNEOrWAGQos1iuZSXlCHwVoB_k",
      authDomain: "farmroute-49758.firebaseapp.com",
      projectId: "farmroute-49758",
      storageBucket: "farmroute-49758.firebasestorage.app",
      messagingSenderId: "1067367723341",
      appId: "1:1067367723341:web:854daaa610d0bc87b80704"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Toggle forms logic
    const modeInput = document.getElementById('formMode');
    const signupFields = document.getElementById('signupFields');
    const submitBtn = document.getElementById('submitBtn');

    document.getElementById('showLogin').addEventListener('click', () => {
      modeInput.value = 'login';
      signupFields.classList.add('hidden');
      submitBtn.innerText = 'Test Login';
      document.getElementById('showLogin').className = "font-semibold text-green-600 border-b-2 border-green-600 pb-1";
      document.getElementById('showSignup').className = "font-semibold text-gray-400 pb-1";
    });

    document.getElementById('showSignup').addEventListener('click', () => {
      modeInput.value = 'signup';
      signupFields.classList.remove('hidden');
      submitBtn.innerText = 'Create Test Account';
      document.getElementById('showSignup').className = "font-semibold text-green-600 border-b-2 border-green-600 pb-1";
      document.getElementById('showLogin').className = "font-semibold text-gray-400 pb-1";
    });

    // Handle form submit
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (modeInput.value === 'signup') {
        const fullName = document.getElementById('fullName').value;
        const phoneNumber = document.getElementById('phoneNumber').value;
        const role = document.getElementById('role').value;

        try {
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, "users", cred.user.uid), {
            uid: cred.user.uid,
            name: fullName,
            email: email,
            role: role,
            phoneNumber: phoneNumber,
            createdAt: new Date().toISOString()
          });
          alert(`Sign up successful! UID: ${cred.user.uid}`);
        } catch (err) { alert(err.message); }

      } else {
        try {
          const cred = await signInWithEmailAndPassword(auth, email, password);
          alert(`Logged in successfully as ${cred.user.email}`);
        } catch (err) { alert(err.message); }
      }
    });

    // Handle logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      alert("Logged out!");
    });
  </script>
</body>
</html>
