<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmRoute - My Listings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50/50 text-gray-800">

    <div class="flex h-screen overflow-hidden">
        <aside id="side-bar" class="md:w-64 w-full bg-green-950 text-white flex flex-col h-screen shrink-0">
            <div class="px-6 py-2 items-center justify-between flex border-b border-green-900">
                <img class="h-16" src="../assets/logo3.png" alt="FarmRoute Logo">
                <button id="closeside-btn" class="hidden max-sm:flex text-2xl">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>

            <nav class="flex-1 mt-6 overflow-y-auto">
                <a href="dashboard.html" class="flex items-center gap-3 hover:bg-green-800 mx-4 px-4 py-3 rounded-lg mb-2 text-gray-300 hover:text-white">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
                <a href="listings.html" class="flex items-center gap-3 px-4 py-3 mx-4 rounded-lg bg-green-700 text-white mb-2">
                    <i class="fa-solid fa-box-open"></i> My Listings
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 mx-4 rounded-lg hover:bg-green-800 text-gray-300 hover:text-white mb-2">
                    <i class="fa-solid fa-truck"></i> Orders
                </a>
                <a href="#" class="flex items-center justify-between px-4 py-3 mx-4 rounded-lg hover:bg-green-800 text-gray-300 hover:text-white mb-2">
                    <div class="flex items-center gap-3">
                        <i class="fa-regular fa-message"></i> Messages
                    </div>
                    <span class="bg-green-500 text-xs px-2 py-1 rounded-full text-white">3</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 mx-4 rounded-lg hover:bg-green-800 text-gray-300 hover:text-white mb-2">
                    <i class="fa-solid fa-route"></i> Routes
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 mx-4 rounded-lg hover:bg-green-800 text-gray-300 hover:text-white mb-2">
                    <i class="fa-solid fa-wallet"></i> Payments
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 mx-4 rounded-lg hover:bg-green-800 text-gray-300 hover:text-white mb-2">
                    <i class="fa-regular fa-user"></i> Profile
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 mx-4 rounded-lg hover:bg-green-800 text-gray-300 hover:text-white mb-6">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
                <div class="px-4 mb-4">
                    <a href="add_produce.html" class="flex items-center justify-center gap-2 w-full bg-emerald-100 hover:bg-emerald-200 text-emerald-900 font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-sm text-sm">
                        <i class="fa-solid fa-plus text-base"></i> List New Produce
                    </a>
                </div>
            </nav>

            <div class="p-4 border-t border-green-900">
                <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-green-800 text-left text-gray-300 hover:text-white transition">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="bg-white h-20 px-4 sm:px-8 flex items-center justify-between border-b shrink-0 z-30">
                <div class="flex items-center gap-4">
                    <button id="side-btn" class="text-xl text-gray-600 md:hidden"><i class="fa-solid fa-bars"></i></button>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold text-gray-900">My Listings</h1>
                        <p class="text-xs sm:text-sm text-gray-500 hidden sm:block">Manage and monitor your active produce offers on the marketplace.</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 sm:gap-6">
                    <div class="flex items-center gap-3 border-l pl-4 sm:pl-6">
                        <img src="https://i.pravatar.cc/100?img=12" class="w-10 h-10 rounded-full object-cover">
                        <div class="hidden sm:block text-left">
                            <h4 id="user-display-name" class="font-semibold text-sm text-gray-900 leading-tight">Loading...</h4>
                            <span id="user-display-role" class="text-xs text-emerald-600 font-medium capitalize">Farmer</span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
                <div class="max-w-7xl mx-auto space-y-6">
                    
                    <div class="bg-white p-4 rounded-2xl border flex flex-col sm:flex-row gap-4 justify-between items-center shadow-sm">
                        <div class="relative w-full sm:w-80">
                            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                            <input type="text" id="search-input" placeholder="Search produce..." class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none transition">
                        </div>
                        <div class="flex gap-3 w-full sm:w-auto">
                            <select id="status-filter" class="w-full sm:w-40 px-4 py-2.5 bg-gray-50 border rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none transition">
                                <option value="All">All Statuses</option>
                                <option value="In Transit">In Transit</option>
                                <option value="Matched">Matched</option>
                                <option value="Pending">Pending</option>
                                <option value="Searching">Searching</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl border p-4 sm:p-6 shadow-sm">
                        <div id="listings-wrapper" class="divide-y divide-gray-100">
                            <div class="text-center py-12 text-gray-500">
                                <i class="fa-solid fa-spinner fa-spin text-2xl text-emerald-600 mb-2"></i>
                                <p class="text-sm">Loading your listings...</p>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "../Backend/firebaseConfig.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const LOGIN_PAGE_URL = "Farmers/login.html";

        const nameEl = document.getElementById("user-display-name");
        const roleEl = document.getElementById("user-display-role");
        const listingsWrapper = document.getElementById("listings-wrapper");
        const searchInput = document.getElementById("search-input");
        const statusFilter = document.getElementById("status-filter");

        let cachedProducts = [];

        // Fallback images asset dictionary
        const fallbackImages = {
            tomatoes: "https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=200",
            pepper: "https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=200",
            yam: "https://images.unsplash.com/photo-1603048297172-c92544798d5a?w=200",
            maize: "https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=200",
            default: "https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=200"
        };

        const statusStyles = {
            "In Transit": "bg-blue-100 text-blue-700",
            "Matched": "bg-green-100 text-green-700",
            "Pending": "bg-yellow-100 text-yellow-700",
            "Searching": "bg-purple-100 text-purple-700"
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = LOGIN_PAGE_URL;
                return;
            }

            // Fallback UI profile names
            nameEl.innerText = user.displayName || "FarmRoute User";
            roleEl.innerText = "Farmer";

            try {
                const userDocSnap = await getDoc(doc(db, "users", user.uid));
                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();
                    if (userData.name) nameEl.innerText = userData.name;
                    if (userData.role) roleEl.innerText = userData.role;
                }
            } catch (err) {
                console.error("Firestore user profile payload retrieval failed:", err);
            }

            // Real-time active listings collection tracking logic
            const q = query(collection(db, "products"), where("farmerId", "==", user.uid));
            onSnapshot(q, (snapshot) => {
                cachedProducts = [];
                snapshot.forEach((doc) => {
                    cachedProducts.push({ id: doc.id, ...doc.data() });
                });
                renderListings();
            }, (error) => {
                console.error("Listing snapshot sync loop crash: ", error);
                listingsWrapper.innerHTML = `<div class="text-center py-6 text-red-500 text-sm">Failed to sync database logs.</div>`;
            });
        });

        function renderListings() {
            const searchQuery = searchInput.value.toLowerCase().trim();
            const filterValue = statusFilter.value;

            const filtered = cachedProducts.filter(p => {
                const matchesSearch = (p.name || "").toLowerCase().includes(searchQuery);
                const matchesStatus = filterValue === "All" || p.status === filterValue;
                return matchesSearch && matchesStatus;
            });

            if (filtered.length === 0) {
                listingsWrapper.innerHTML = `
                    <div class="text-center py-16 text-gray-500">
                        <i class="fa-solid fa-box-open text-5xl mb-4 block text-gray-300"></i>
                        <p class="font-medium text-base">No matching produce listings found.</p>
                        <p class="text-xs text-gray-400 mt-1">Try modifying your search or filters.</p>
                    </div>`;
                return;
            }

            listingsWrapper.innerHTML = filtered.map(product => {
                const name = product.name || "Unknown Produce";
                const imgKey = name.toLowerCase().trim();

                // Check for your uploaded Base64 string array first, fallback if it doesn't exist
                const imageSrc = (product.images && product.images.length > 0) 
                    ? product.images[0]
                    : (product.imageUrl || fallbackImages[imgKey] || fallbackImages.default);
                const statusClass = statusStyles[product.status] || "bg-gray-100 text-gray-700";

                return `
                    <div class="flex flex-col lg:flex-row lg:items-center justify-between py-5 gap-4">
                        <div class="flex items-center gap-4 min-w-0">
                            <img src="${imageSrc}" class="w-16 h-16 rounded-xl object-cover shrink-0" alt="${name}">
                            <div class="min-w-0">
                                <h3 class="font-semibold text-lg text-gray-900 truncate">${name}</h3>
                                <p class="text-gray-500 text-sm">${product.quantity || 0} ${product.unit || 'Bags'} • <span class="text-gray-400">${product.category || 'Vegetables'}</span></p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 lg:flex lg:items-center gap-6 text-sm">
                            <div>
                                <span class="block text-xs font-bold uppercase text-gray-400 tracking-wider mb-0.5">Route Path</span>
                                <h4 class="font-medium text-gray-800">${product.routeFrom || product.location || 'N/A'} → ${product.routeTo || 'Lagos'}</h4>
                            </div>
                            <div>
                                <span class="block text-xs font-bold uppercase text-gray-400 tracking-wider mb-0.5">Market Price</span>
                                <h4 class="font-semibold text-lg text-emerald-700">₦${Number(product.price || 0).toLocaleString()} <span class="text-xs font-normal text-gray-500">/${product.unit?.replace(/s$/, '') || 'bag'}</span></h4>
                            </div>
                            <div class="col-span-2 sm:col-span-1 flex items-center lg:block">
                                <span class="${statusClass} px-4 py-1.5 rounded-xl text-xs font-semibold inline-block text-center uppercase tracking-wide">
                                    ${product.status || 'Searching'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        // Search & filter event bindings
        searchInput.addEventListener("input", renderListings);
        statusFilter.addEventListener("change", renderListings);

        // Sidebar responsive viewport handler toggles
        const sideBtn = document.getElementById("side-btn");
        const closeSideBtn = document.getElementById("closeside-btn");
        const sideBar = document.getElementById("side-bar");

        if (sideBtn && sideBar) {
            sideBtn.addEventListener("click", () => sideBar.classList.toggle("hidden"));
        }
        if (closeSideBtn && sideBar) {
            closeSideBtn.addEventListener("click", () => sideBar.classList.add("hidden"));
        }

        // Account signout action routine
        document.getElementById("logout-btn")?.addEventListener("click", () => {
            signOut(auth)
                .then(() => { window.location.href = LOGIN_PAGE_URL; })
                .catch((err) => console.error("Signout logic caught an exception:", err));
        });
    </script>
</body>
</html>
